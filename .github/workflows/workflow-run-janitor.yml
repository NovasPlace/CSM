name: Workflow Run Janitor

on:
  push:
    branches: [master]
    paths:
      - .github/workflows/workflow-run-janitor.yml

permissions:
  actions: write
  contents: write

jobs:
  audit-and-prune:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Inventory and prune obsolete failures
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_RUN_ID: ${{ github.run_id }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          before_json="$(gh api --paginate "repos/${GITHUB_REPOSITORY}/actions/runs?per_page=100" | jq -s '{workflow_runs: map(.workflow_runs) | add}')"

          {
            echo '# Workflow Run Cleanup Report'
            echo
            echo "Generated by run ${CURRENT_RUN_ID} for commit ${CURRENT_SHA}."
            echo
            echo '## Inventory before cleanup'
            echo
            echo '| Run | Workflow | Event | Branch | SHA | Status | Conclusion | Created |'
            echo '|---:|---|---|---|---|---|---|---|'
            echo "$before_json" | jq -r '.workflow_runs | sort_by(.run_number)[] | "| #\(.run_number) (`\(.id)`) | \(.name) | \(.event) | \(.head_branch // "-") | `\(.head_sha[0:8])` | \(.status) | \(.conclusion // "-") | \(.created_at) |"'
          } > docs/WORKFLOW_RUN_CLEANUP.md

          mapfile -t stale_ids < <(
            echo "$before_json" | jq -r --arg current "$CURRENT_RUN_ID" '
              .workflow_runs[]
              | select((.id | tostring) != $current)
              | select(.status == "completed")
              | select(.conclusion == "failure" or .conclusion == "cancelled" or .conclusion == "timed_out" or .conclusion == "action_required" or .conclusion == "startup_failure" or .conclusion == "stale")
              | .id
            '
          )

          deleted=0
          failed_deletes=0
          for run_id in "${stale_ids[@]:-}"; do
            [[ -n "$run_id" ]] || continue
            if gh api --method DELETE "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}"; then
              deleted=$((deleted + 1))
            else
              failed_deletes=$((failed_deletes + 1))
            fi
          done

          after_json="$(gh api --paginate "repos/${GITHUB_REPOSITORY}/actions/runs?per_page=100" | jq -s '{workflow_runs: map(.workflow_runs) | add}')"

          {
            echo
            echo '## Cleanup result'
            echo
            echo "- Obsolete failed/cancelled runs selected: ${#stale_ids[@]}"
            echo "- Deleted successfully: ${deleted}"
            echo "- Deletion failures: ${failed_deletes}"
            echo "- Successful runs preserved: $(echo "$after_json" | jq '[.workflow_runs[] | select(.conclusion == "success")] | length')"
            echo "- Active or queued runs preserved: $(echo "$after_json" | jq '[.workflow_runs[] | select(.status != "completed")] | length')"
            echo
            echo '## Inventory after cleanup'
            echo
            echo '| Run | Workflow | Event | Branch | SHA | Status | Conclusion | Created |'
            echo '|---:|---|---|---|---|---|---|---|'
            echo "$after_json" | jq -r '.workflow_runs | sort_by(.run_number)[] | "| #\(.run_number) (`\(.id)`) | \(.name) | \(.event) | \(.head_branch // "-") | `\(.head_sha[0:8])` | \(.status) | \(.conclusion // "-") | \(.created_at) |"'
          } >> docs/WORKFLOW_RUN_CLEANUP.md

      - name: Commit report and remove one-shot workflow
        run: |
          set -euo pipefail
          rm .github/workflows/workflow-run-janitor.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/WORKFLOW_RUN_CLEANUP.md .github/workflows/workflow-run-janitor.yml
          git commit -m 'chore(ci): record workflow cleanup [skip ci]'
          git push
